# White-label deployment workflow — completely separate from prod-in/prod-us.
#
# The deployment list lives in one GitHub secret: DEPLOYMENTS_CONFIG
# Add / remove tenants by editing that secret — no code change needed.
#
# DEPLOYMENTS_CONFIG format (JSON array):
#   [
#     {
#       "name": "flexprice-in",
#       "vercel_project_id": "prj_xxxx",
#       "vercel_token": "",        <- empty = fall back to shared VERCEL_TOKEN
#       "vercel_org_id": ""        <- empty = fall back to shared VERCEL_ORG_ID
#     },
#   ]
#
# Required GitHub secrets:
#   DEPLOYMENTS_CONFIG, VERCEL_TOKEN, VERCEL_ORG_ID, SENTRY_AUTH_TOKEN

name: White-Label Production Deployment

on:
  push:
    branches:
      - develop

jobs:
  # Bridges DEPLOYMENTS_CONFIG secret into a matrix.
  # (strategy.matrix cannot access the secrets context directly)
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        # Pretty-printed JSON contains newlines — must use multiline GITHUB_OUTPUT
        # syntax or only the first line is captured and the rest breaks parsing.
        run: |
          if [ -z "${DEPLOYMENTS_CONFIG// }" ]; then
            echo "::error::DEPLOYMENTS_CONFIG secret is empty or not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if ! echo "$DEPLOYMENTS_CONFIG" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
            echo "::error::DEPLOYMENTS_CONFIG must be a non-empty JSON array (see workflow header comment)."
            exit 1
          fi
          delimiter='DEPLOYMENTS_MATRIX_JSON_EOF'
          {
            echo "matrix<<${delimiter}"
            echo "$DEPLOYMENTS_CONFIG"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
        env:
          DEPLOYMENTS_CONFIG: ${{ secrets.DEPLOYMENTS_CONFIG }}

  deploy:
    needs: setup
    if: ${{ needs.setup.result == 'success' && needs.setup.outputs.matrix != '' && needs.setup.outputs.matrix != '[]' }}
    name: Deploy / ${{ matrix.deployment.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Fallback avoids "fromJSON: empty input" when setup fails or output is unset.
        deployment: ${{ fromJSON(needs.setup.outputs.matrix != '' && needs.setup.outputs.matrix || '[]') }}

    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      # Must be first: registers per-deployment credentials as masked so they
      # never appear in plain text in any subsequent step log or error output.
      - name: Mask deployment secrets
        env:
          _TOKEN: ${{ matrix.deployment.vercel_token }}
          _ORG: ${{ matrix.deployment.vercel_org_id }}
        run: |
          [ -n "$_TOKEN" ] && echo "::add-mask::$_TOKEN"
          [ -n "$_ORG"   ] && echo "::add-mask::$_ORG"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Resolve Vercel credentials
        env:
          _TOKEN: ${{ matrix.deployment.vercel_token }}
          _ORG: ${{ matrix.deployment.vercel_org_id }}
          _PROJECT_ID: ${{ matrix.deployment.vercel_project_id }}
          _FB_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          _FB_ORG: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          echo "VERCEL_TOKEN=${_TOKEN:-$_FB_TOKEN}"     >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${_ORG:-$_FB_ORG}"       >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$_PROJECT_ID"         >> "$GITHUB_ENV"

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Install dependencies
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install

      - name: Generate Version Meta
        run: npm run generate-meta

      - name: Build Project Artifacts
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
