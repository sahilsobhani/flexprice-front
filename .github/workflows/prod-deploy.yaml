# White-label deployment workflow — completely separate from prod-in/prod-us.
#
# Tenants are listed in one GitHub secret: DEPLOYMENTS_CONFIG
# Add / remove tenants by editing that secret — no code change needed.
#
# Deployments run sequentially (one tenant after another) in a single job.
# Slower than a parallel matrix but avoids job-output / fromJSON issues.
#
# DEPLOYMENTS_CONFIG format — JSON array (minified one line is most reliable):
#   [{"name":"flexprice-in","vercel_project_id":"prj_xxxx","vercel_token":"","vercel_org_id":""}]
#
# Store as a repository **Secret** named DEPLOYMENTS_CONFIG (not a Variable).
# Pretty-printed JSON with newlines also works.
#
# Required GitHub secrets:
#   DEPLOYMENTS_CONFIG, VERCEL_TOKEN, VERCEL_ORG_ID, SENTRY_AUTH_TOKEN

name: White-Label Production Deployment

on:
  push:
    branches:
      - private # - main

jobs:
  deploy:
    name: White-label production deploy
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      DEPLOYMENTS_CONFIG: ${{ secrets.DEPLOYMENTS_CONFIG || vars.DEPLOYMENTS_CONFIG }}
      VERCEL_TOKEN_FB: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID_FB: ${{ secrets.VERCEL_ORG_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install

      - name: Deploy each tenant sequentially
        run: |
          set -euo pipefail

          config="${DEPLOYMENTS_CONFIG:-}"
          config="${config//$'\r'/}"

          if [ -z "${config//[[:space:]]/}" ]; then
            echo "::error::DEPLOYMENTS_CONFIG is empty. Create a repository **Secret** (not Variable) named DEPLOYMENTS_CONFIG under Settings → Secrets and variables → Actions."
            exit 1
          fi

          echo "DEPLOYMENTS_CONFIG length: ${#config} characters"

          if jq -e 'type == "string"' <<<"$config" >/dev/null 2>&1; then
            config="$(jq -r '.' <<<"$config")"
          fi

          normalized="$(jq -c '
            if type == "array" then .
            elif type == "object" and (.deployments | type == "array") then .deployments
            else empty
            end
          ' <<<"$config" 2>/dev/null || true)"

          if [ -z "$normalized" ] || [ "$normalized" = "null" ]; then
            jq_err="$(jq -c . <<<"$config" 2>&1 || true)"
            echo "::error::DEPLOYMENTS_CONFIG must be a non-empty JSON array. jq: ${jq_err:-invalid JSON}"
            exit 1
          fi

          count="$(jq 'length' <<<"$normalized")"
          if [ "$count" -lt 1 ]; then
            echo "::error::DEPLOYMENTS_CONFIG array is empty — add at least one deployment object."
            exit 1
          fi

          echo "DEPLOYMENTS_CONFIG deployments: $count"

          while IFS= read -r deployment; do
            name="$(jq -r '.name' <<<"$deployment")"
            token="$(jq -r '.vercel_token // ""' <<<"$deployment")"
            org="$(jq -r '.vercel_org_id // ""' <<<"$deployment")"
            project_id="$(jq -r '.vercel_project_id' <<<"$deployment")"

            echo "::group::Deploy ${name}"
            [ -n "$token" ] && echo "::add-mask::${token}"
            [ -n "$org" ]   && echo "::add-mask::${org}"

            export VERCEL_TOKEN="${token:-$VERCEL_TOKEN_FB}"
            export VERCEL_ORG_ID="${org:-$VERCEL_ORG_ID_FB}"
            export VERCEL_PROJECT_ID="$project_id"

            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            npm run generate-meta
            export NODE_OPTIONS="--max-old-space-size=4096"
            vercel build --prod --token="$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
            echo "::endgroup::"
          done < <(jq -c '.[]' <<<"$normalized")
